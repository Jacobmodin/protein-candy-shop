<svg width="800" height="1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="1000" fill="#1a1a1a"/>
  
  <!-- Green container shape (candy bag) -->
  <path d="M 150 200 Q 150 150 200 150 L 600 150 Q 650 150 650 200 L 650 850 Q 650 900 600 900 L 200 900 Q 150 900 150 850 Z" 
        fill="#90C850" stroke="#000" stroke-width="3"/>
  
  <!-- Top seal/closure -->
  <ellipse cx="400" cy="150" rx="200" ry="30" fill="#70A830"/>
  <rect x="350" y="120" width="100" height="40" rx="5" fill="#1a1a1a"/>
  
  <!-- Label area -->
  <rect x="200" y="300" width="400" height="450" rx="10" fill="#1a1a1a" opacity="0.9"/>
  
  <!-- Sweden flag colors -->
  <rect x="350" y="320" width="100" height="60" fill="#005293"/>
  <rect x="350" y="350" width="100" height="4" fill="#FECB00"/>
  <rect x="395" y="320" width="4" height="60" fill="#FECB00"/>
  
  <!-- Product text -->
  <text x="400" y="420" font-family="Arial, sans-serif" font-size="36" font-weight="bold" 
        fill="#90C850" text-anchor="middle">SWEDEN</text>
  <text x="400" y="460" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="#fff" text-anchor="middle">PROTEIN</text>
  <text x="400" y="500" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="#fff" text-anchor="middle">CANDY</text>
  
  <!-- Flavor -->
  <text x="400" y="550" font-family="Arial, sans-serif" font-size="28" 
        fill="#90C850" text-anchor="middle" font-style="italic">Surt Äpple</text>
  
  <!-- Key benefits -->
  <text x="400" y="600" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
        fill="#fff" text-anchor="middle">34g PROTEIN / 100g</text>
  <text x="400" y="635" font-family="Arial, sans-serif" font-size="16"
        fill="#90C850" text-anchor="middle">+ L-Arginin</text>
  <text x="400" y="660" font-family="Arial, sans-serif" font-size="16"
        fill="#90C850" text-anchor="middle">+ Koenzym Q10</text>
  <text x="400" y="685" font-family="Arial, sans-serif" font-size="16"
        fill="#90C850" text-anchor="middle">+ Vitamin B-Komplex</text>
  
  <!-- Weight -->
  <text x="400" y="720" font-family="Arial, sans-serif" font-size="18"
        fill="#fff" text-anchor="middle">180g / 60 gummies</text>
  
  <!-- Gummy candies illustration -->
  <ellipse cx="250" cy="800" rx="30" ry="25" fill="#90C850" opacity="0.8"/>
  <ellipse cx="320" cy="820" rx="30" ry="25" fill="#90C850" opacity="0.8"/>
  <ellipse cx="400" cy="810" rx="30" ry="25" fill="#90C850" opacity="0.8"/>
  <ellipse cx="480" cy="820" rx="30" ry="25" fill="#90C850" opacity="0.8"/>
  <ellipse cx="550" cy="800" rx="30" ry="25" fill="#90C850" opacity="0.8"/>
</svg>
